<html>
	<head>
		<title> class 5 </title>
		<link rel="stylesheet" href="style.css">
	</head>
	<body>
		<!-- divs are used as containers or dividng elements to group sections of content together -->
		<div class="container">
			<p>position: static</p>
			<div class="static-child">
			</div>
		</div>
		<div class="container">
			<p>position: relative</p>
			<div class="relative-child">
			</div>
		</div>
		<div class="container">
			<p>position: absolute</p>
			<div class="absolute-child">
			</div>
		</div>
		<div class="container
		relative-parent">
			<p>position: absolute with parent relative</p>
			<div class="absolute-child">
		</div>
		<div class="container">
			<p>position: fixed</p>
			<div class="fixed-child">
		</div>
		</div>
		<div class="sticky-child">
		</div>
		<div class="container down-under">
			<p>position: sticky </p>
		</div>

		<div class="big-container">
			<img src="documentation-images/butterfly.jpg">
		</div>
	</body>
</html>
